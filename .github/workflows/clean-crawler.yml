name: Check In

# ✅ 签到续期（自愈版）
# ✅ 功能：删除旧纪录 + 自动启用被禁用的 Workflow + 触发 Get Hot News
#
# 每 7 天至少运行一次，忘记运行也没关系，每天会定时自愈一次
# Run at least once every 7 days, or let the daily schedule auto-heal

on:
  workflow_dispatch:
  schedule:
    # 每天北京时间 12:00 自动签到（可选，不需要可删掉这行）
    - cron: "0 4 * * *"

jobs:
  renew:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete all workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
          delete_workflow_by_state_pattern: "ALL"
          delete_run_by_conclusion_pattern: "ALL"

      # ⭐ 自愈：检查 crawler.yml 状态，被禁用则自动启用
      - name: Auto-repair and re-trigger crawler
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 检查 Get Hot News (crawler.yml) 状态..."
          STATE=$(gh api repos/${{ github.repository }}/actions/workflows/crawler.yml --jq '.state')
          echo "当前状态: $STATE"

          if [ "$STATE" != "active" ]; then
            echo "⚠️ 已被禁用，正在重新启用..."
            gh api -X PUT repos/${{ github.repository }}/actions/workflows/crawler.yml/enable
            sleep 2
            echo "✅ 已启用"
          else
            echo "✅ 状态正常"
          fi

          # 触发一次 Get Hot News
          echo "🚀 正在触发 Get Hot News..."
          gh workflow run crawler.yml
          echo "✅ 已触发，请到 Actions 查看进度"
